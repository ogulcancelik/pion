# Pion configuration example
# Copy to ~/.pion/config.yaml and customize.

# Optional base runtime directory (default: ~/.pion)
# dataDir: "~/.pion"

# Optional skills directory (default: ~/.pion/skills)
# skillsDir: "~/.pion/skills"

# Optional auth storage path.
# Default is ~/.pion/auth.json.
# File format is compatible with pi auth.json.
# authPath: "~/.pion/auth.json"

# Message debounce window in milliseconds (default: 5000).
# Batches rapid-fire message fragments into one prompt.
# Set to 0 to disable debouncing.
# debounceMs: 5000

# Default timeout for bash tool calls in seconds (default: 300).
# The bash tool can still override this per call.
# bashTimeoutSec: 300

# Optional global model override for session_query lookups.
# If unset, Pion uses the active session model.
# recallQueryModel: "anthropic/claude-haiku-4-5"

telegram:
  botToken: "your-bot-token-here"
  # Optional: notify this chat when the daemon starts
  # startupNotify: "123456"
  # Optional live-status behavior
  # status:
  #   clearOnComplete: true

cron:
  # Default execution profile for scheduled agent jobs.
  # This is separate from chat-routing agents.
  agent:
    model: anthropic/claude-haiku-4-5
    workspace: "~/.pion/agents/main"
    # Optional execution cwd. Defaults to workspace when omitted.
    # cwd: "~/Projects/some-repo"
    skills:
      - web-browse

agents:
  main:
    model: anthropic/claude-sonnet-4-20250514
    workspace: "~/.pion/agents/main"
    # Optional execution cwd. Defaults to workspace when omitted.
    # cwd: "~/Projects/some-repo"
    systemPrompt: |
      You are a helpful assistant with full access to tools and capabilities.
      Be concise but thorough.
    skills:
      - web-browse
      - supervise

  casual:
    model: anthropic/claude-sonnet-4-20250514
    workspace: "~/.pion/agents/casual"
    systemPrompt: |
      You're chatting in a friend group. Be casual, witty, and fun.
      Keep responses short unless asked for detail.
    skills: []

  family:
    model: anthropic/claude-sonnet-4-20250514
    workspace: "~/.pion/agents/family"
    systemPrompt: |
      You help with everyday questions. Be patient and clear.
      Explain things simply. Use the user's language.
    skills: []

# Routing rules: first match wins.
routes:
  # VIP contact gets main agent
  - match:
      contact: "+1234567890"
    agent: main
    isolation: per-contact

  # Specific group gets casual agent
  - match:
      group: "Friends"
    agent: casual
    isolation: per-chat

  # Family member gets family agent
  - match:
      contact: "+0987654321"
    agent: family
    isolation: per-contact

  # All other DMs go to main
  - match:
      type: dm
    agent: main
    isolation: per-contact

  # Ignore unmatched groups
  - match:
      type: group
    agent: null
    isolation: per-chat
